openapi: 3.0.3
info:
  title: Project Management System API
  description: |
    Project Management System (PMS) Backend API
    
    ## Role Definitions
    - **PM (Project Manager)**: Can create and manage their own projects
    - **Admin**: Has full access to all projects and user management
    
    ## Authentication
    - All endpoints except `/api/v1/auth/register` and `/api/v1/auth/login` require JWT token
    - Token should be passed in Authorization header: `Bearer <token>`
    
    ## Error Handling
    - All errors follow the standard error response format
    - HTTP status codes indicate success/failure
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://api.pms.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Users
    description: User management endpoints
  - name: Projects
    description: Project management endpoints
  - name: Gantt
    description: Gantt chart and timeline data endpoints

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Register a new user account. Admin role can only be assigned by existing admins.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{user_id}:
    get:
      tags:
        - Users
      summary: Get user profile
      description: Get user profile information
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    put:
      tags:
        - Users
      summary: Update user profile
      description: Update user profile information
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects:
    post:
      tags:
        - Projects
      summary: Create project
      description: Create a new project (PM can create own projects)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    get:
      tags:
        - Projects
      summary: List projects
      description: |
        List projects. PMs see their own projects, Admins see all projects.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [planning, in_progress, on_hold, completed, cancelled]
        - name: owner_id
          in: query
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Projects list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{project_id}:
    get:
      tags:
        - Projects
      summary: Get project details
      description: Get project details by ID
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Project retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    put:
      tags:
        - Projects
      summary: Update project
      description: |
        Update project. PMs can update their own projects, Admins can update all.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    delete:
      tags:
        - Projects
      summary: Delete project
      description: Delete project (Admin only)
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Project deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (PM cannot delete)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{project_id}/gantt:
    get:
      tags:
        - Gantt
      summary: Get Gantt chart data
      description: Get Gantt chart data for a project including tasks and milestones
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Gantt chart data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GanttDataResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/projects/{project_id}/timeline:
    get:
      tags:
        - Gantt
      summary: Get timeline data
      description: Get timeline events for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: event_type
          in: query
          schema:
            type: string
            enum: [task_status_change, project_status_change, milestone, due_date, all]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Timeline data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineDataResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          maxLength: 100
        role:
          type: string
          enum: [PM, ADMIN]
          default: PM
    
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
    
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        team_member_ids:
          type: array
          items:
            type: string
    
    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        status:
          type: string
          enum: [planning, in_progress, on_hold, completed, cancelled]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        team_member_ids:
          type: array
          items:
            type: string
    
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [PM, ADMIN]
        is_active:
          type: boolean
        is_email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
    
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserResponse'
    
    TeamMember:
      type: object
      properties:
        user_id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        joined_at:
          type: string
          format: date-time
    
    ProjectResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planning, in_progress, on_hold, completed, cancelled]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        owner_id:
          type: string
        owner:
          $ref: '#/components/schemas/UserResponse'
        team_members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    ProjectListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectResponse'
    
    GanttTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [todo, in_progress, blocked, completed, cancelled]
        progress:
          type: integer
        dependencies:
          type: array
          items:
            type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/GanttTask'
    
    GanttMilestone:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        date:
          type: string
          format: date
    
    GanttDataResponse:
      type: object
      properties:
        project_id:
          type: string
        project_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/GanttTask'
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/GanttMilestone'
    
    TimelineEvent:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
          enum: [task_status_change, project_status_change, milestone, due_date]
        title:
          type: string
        description:
          type: string
        event_date:
          type: string
          format: date-time
        related_id:
          type: string
        related_type:
          type: string
          enum: [task, project, milestone]
    
    TimelineDataResponse:
      type: object
      properties:
        project_id:
          type: string
        project_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
    
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
